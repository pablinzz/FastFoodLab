<!DOCTYPE html>
<html>
<head>
    <title>Menu</title>
</head>
<body>
    <h1>Menu</h1>

    <a href="/produtos/novo">Novo produto</a>
    <a href="/carrinho">Ver Carrinho</a>

    <ul>
        {% for produto in produtos %}
            <li>
                <strong>{{ produto.nome }}</strong><br>
                Categoria: {{ produto.categoria }}<br>
                Preço: R$ {{ "%.2f"|format(produto.preco) }}

                <form method="post" action="/carrinho/add/{{ produto.id }}">
                    <button type="submit">Adicionar</button>
                </form>
            </li>
        {% endfor %}
    </ul>
</body>
</html>
