<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Lab85 - Admin de Produtos</title>
    <style>
        body { font-family: 'Nunito', sans-serif; background: #111; color: white; padding: 40px; }
        .form-container { background: #222; padding: 30px; border-radius: 15px; max-width: 500px; margin: auto; }
        input { width: 100%; padding: 10px; margin: 10px 0 20px; border-radius: 8px; border: none; font-size: 1.1rem; }
        button { width: 100%; background: #FF5E00; color: white; padding: 15px; border: none; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>🍔 Cadastrar Novo Produto</h2>
        <form onsubmit="salvarProduto(event)">
            <label>Nome do Produto:</label>
            <input type="text" id="nome" required placeholder="Ex: Smash Burger">

            <label>Preço (R$):</label>
            <input type="number" id="preco" step="0.01" required placeholder="Ex: 25.90">

            <label>URL da Imagem:</label>
            <input type="text" id="imagem_url" placeholder="Link do Supabase Storage">

            <button type="submit">CADASTRAR PRODUTO</button>
        </form>
    </div>

    <script>
        const API_URL = "https://fastfoodlab.onrender.com";

        async function salvarProduto() {
            const nome = document.getElementById("nome").value;
            const preco = document.getElementById("preco").value;
            const categoria = document.getElementById("categoria").value;
            const imagem_url = document.getElementById("imagem_url")?.value || "";

            const response = await fetch("https://fastfoodlab.onrender.com/produtos", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    nome, 
                    preco: parseFloat(preco), 
                    categoria, 
                    imagem_url 
                })
            });

            if (response.ok) {
                alert("Produto cadastrado com sucesso!");
                window.location.reload(); // Atualiza a lista
            } else {
                alert("Erro ao cadastrar produto.");
            }
        }
    </script>
</body>
</html>
