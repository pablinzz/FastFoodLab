<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Boteco do MK - Painel Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --surface: #141414;
            --border: #2a2a2a;
            --green: #2ecc71;
            --yellow: #f1c40f;
            --danger: #e74c3c;
            --text-main: #ffffff;
            --text-muted: #888888;
        }

        body { 
            font-family: 'Nunito', sans-serif; 
            background: var(--bg-dark); 
            color: var(--text-main); 
            padding: 40px; 
            margin: 0;
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 20px;
        }
        
        .header h1 { color: var(--yellow); font-weight: 800; font-size: 2.5rem; margin: 0; }

        .dashboard-container {
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }

        /* LADO ESQUERDO: FORMULÁRIO */
        .form-section { 
            flex: 1;
            background: var(--surface); 
            padding: 30px; 
            border-radius: 20px; 
            border: 1px solid var(--border); 
        }

        .form-section h2 { color: var(--green); margin-bottom: 20px; font-size: 1.8rem; }
        label { display: block; margin-top: 15px; font-weight: bold; color: var(--text-muted); }
        input, select { 
            width: 100%; padding: 12px; margin-top: 5px; border-radius: 10px; 
            border: 1px solid var(--border); background: #1e1e1e; color: white; font-size: 1.1rem; 
            outline: none; transition: 0.3s;
        }
        input:focus, select:focus { border-color: var(--yellow); }

        .ingredientes-section { 
            margin-top: 30px; padding: 20px; background: #0f0f0f; 
            border-radius: 15px; border: 1px dashed #444; 
        }
        .ingrediente-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .ingrediente-row input { margin-top: 0; }
        
        .btn-remover-ing { background: var(--danger); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-adicionar-ing { background: #333; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; margin-top: 10px; font-weight: bold; width: 100%; transition: 0.2s;}
        .btn-adicionar-ing:hover { background: #444; color: var(--yellow); }

        .btn-salvar { 
            width: 100%; background: var(--green); color: #000; padding: 18px; 
            border: none; border-radius: 12px; font-size: 1.3rem; font-weight: 800; 
            cursor: pointer; margin-top: 30px; transition: 0.2s;
        }
        .btn-salvar:active { transform: scale(0.98); }

        /* LADO DIREITO: LISTA DE PRODUTOS */
        .list-section {
            flex: 1.2;
            background: var(--surface);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .list-section h2 { color: var(--yellow); margin-bottom: 20px; font-size: 1.8rem; }
        
        .produtos-lista {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 700px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .produto-card {
            display: flex;
            align-items: center;
            background: #1a1a1a;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            gap: 15px;
        }

        .produto-img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; background: #222; }
        .produto-info { flex: 1; }
        .produto-nome { font-size: 1.2rem; font-weight: bold; color: white; }
        .produto-categoria { font-size: 0.9rem; color: var(--text-muted); background: #333; padding: 2px 8px; border-radius: 10px; display: inline-block; margin-top: 5px;}
        .produto-preco { font-size: 1.2rem; font-weight: bold; color: var(--green); margin-top: 5px; }

        .btn-apagar-produto {
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 15px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-apagar-produto:hover { background: #c0392b; }

        /* Scrollbar customizada */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--yellow); }
    </style>
</head>
<body>

    <div class="header">
        <h1>⚙️ Boteco do MK - Painel Admin</h1>
    </div>

    <div class="dashboard-container">
        <!-- FORMULÁRIO DE CADASTRO -->
        <div class="form-section">
            <h2>➕ Cadastrar Novo Produto</h2>
            <form id="produto-form">
                <label>Nome do Produto:</label>
                <input type="text" id="nome" required placeholder="Ex: Hambúrguer Duplo MK">

                <label>Preço Base (R$):</label>
                <input type="number" id="preco" step="0.01" required placeholder="Ex: 25.90">

                <label>Categoria:</label>
                <select id="categoria">
                    <option value="Lanches">Lanches</option>
                    <option value="Porções">Porções</option>
                    <option value="Bebidas">Bebidas</option>
                    <option value="Sobremesas">Sobremesas</option>
                </select>

                <label>URL da Imagem (Supabase):</label>
                <input type="text" id="imagem_url" placeholder="https://...supabase.co/.../foto.jpg">

                <div class="ingredientes-section">
                    <h3 style="color: white; margin-top: 0;">Personalização (Extras)</h3>
                    <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 15px;">Adicione opcionais pagos para este produto.</p>
                    <div id="lista-ingredientes"></div>
                    <button type="button" class="btn-adicionar-ing" onclick="adicionarLinhaIngrediente()">+ ADICIONAR INGREDIENTE EXTRA</button>
                </div>

                <button type="submit" class="btn-salvar">CADASTRAR PRODUTO</button>
            </form>
        </div>

        <!-- LISTA DE PRODUTOS -->
        <div class="list-section">
            <h2>📋 Produtos no Cardápio</h2>
            <div id="produtos-lista" class="produtos-lista">
                <p style="color: #666;">Carregando produtos...</p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://fastfoodlab.onrender.com";
        let produtosAdmin = [];
        let produtoEditandoId = null;

        // --- GESTÃO DE INGREDIENTES NO FORMULÁRIO ---
        function adicionarLinhaIngrediente(nome = "", preco = "") {
            const container = document.getElementById("lista-ingredientes");
            const row = document.createElement("div");
            row.className = "ingrediente-row";
            row.innerHTML = `
                <input type="text" placeholder="Ex: Bacon Extra" class="ing-nome" style="flex: 2;" required value="${nome}">
                <input type="number" step="0.01" placeholder="R$ 0,00" class="ing-preco" style="flex: 1;" required value="${preco}">
                <button type="button" class="btn-remover-ing" onclick="this.parentElement.remove()">X</button>
            `;
            container.appendChild(row);
        }

        // --- CADASTRAR OU EDITAR PRODUTO ---
        document.getElementById("produto-form").onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById("btn-salvar-form");
            btn.innerText = "Salvando...";
            btn.disabled = true;

            const nomes = document.querySelectorAll(".ing-nome");
            const precos = document.querySelectorAll(".ing-preco");
            const ingredientes = [];

            nomes.forEach((el, i) => {
                if (el.value) {
                    ingredientes.push({
                        nome: el.value,
                        preco: parseFloat(precos[i].value) || 0
                    });
                }
            });

            const dados = {
                nome: document.getElementById("nome").value,
                preco: parseFloat(document.getElementById("preco").value),
                categoria: document.getElementById("categoria").value,
                imagem_url: document.getElementById("imagem_url").value || null,
                ingredientes_disponiveis: ingredientes
            };

            try {
                let response;
                if (produtoEditandoId) {
                    // MODO EDIÇÃO (PUT)
                    response = await fetch(`${API_URL}/produtos/${produtoEditandoId}`, {
                        method: "PUT",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(dados)
                    });
                } else {
                    // MODO CRIAÇÃO (POST)
                    response = await fetch(`${API_URL}/produtos/`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(dados)
                    });
                }

                if (response.ok) {
                    alert(produtoEditandoId ? "✅ Produto atualizado com sucesso!" : "✅ Produto cadastrado com sucesso!");
                    cancelarEdicao(); // Reseta o form para o modo normal
                    carregarListaProdutos(); // Atualiza a lista da direita
                } else {
                    alert("❌ Erro ao salvar o produto.");
                }
            } catch (err) {
                alert("Erro de conexão com a API.");
            } finally {
                btn.innerText = produtoEditandoId ? "💾 ATUALIZAR PRODUTO" : "CADASTRAR PRODUTO";
                btn.disabled = false;
            }
        };

        // --- PREPARAR PARA EDITAR UM ITEM ---
        function editarProduto(id) {
            const prod = produtosAdmin.find(p => p.id === id);
            if (!prod) return;

            // Preenche a esquerda com os dados da direita
            produtoEditandoId = prod.id;
            document.getElementById("nome").value = prod.nome;
            document.getElementById("preco").value = prod.preco;
            document.getElementById("categoria").value = prod.categoria || "Lanches";
            document.getElementById("imagem_url").value = prod.imagem_url || "";

            document.getElementById("lista-ingredientes").innerHTML = "";
            if (prod.ingredientes_disponiveis) {
                prod.ingredientes_disponiveis.forEach(ing => {
                    adicionarLinhaIngrediente(ing.nome, ing.preco);
                });
            }

            // Altera o visual do formulário para modo Edição
            document.getElementById("titulo-formulario").innerText = "✏️ Editando Produto";
            const btnSalvar = document.getElementById("btn-salvar-form");
            btnSalvar.innerText = "💾 ATUALIZAR PRODUTO";
            btnSalvar.style.background = "var(--yellow)";
            document.getElementById("btn-cancelar-edicao").style.display = "block";
            
            // Faz scroll para o topo caso esteja a editar no telemóvel
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // --- CANCELAR MODO EDIÇÃO ---
        function cancelarEdicao() {
            produtoEditandoId = null;
            document.getElementById("produto-form").reset();
            document.getElementById("lista-ingredientes").innerHTML = "";
            
            // Devolve o visual do formulário ao normal
            document.getElementById("titulo-formulario").innerText = "➕ Cadastrar Novo Produto";
            const btnSalvar = document.getElementById("btn-salvar-form");
            btnSalvar.innerText = "CADASTRAR PRODUTO";
            btnSalvar.style.background = "var(--green)";
            document.getElementById("btn-cancelar-edicao").style.display = "none";
        }

        // --- CARREGAR LISTA DE PRODUTOS ---
        async function carregarListaProdutos() {
            const container = document.getElementById("produtos-lista");
            try {
                const response = await fetch(`${API_URL}/produtos/`);
                const produtos = await response.json();

                produtosAdmin = produtos; // Salva na memória global para podermos editar
                container.innerHTML = "";

                if (produtos.length === 0) {
                    container.innerHTML = "<p style='color: #666;'>Nenhum produto cadastrado.</p>";
                    return;
                }

                produtos.forEach(prod => {
                    const imgSrc = prod.imagem_url || 'https://via.placeholder.com/60/222222/555555?text=Sem+Foto';
                    
                    const card = document.createElement("div");
                    card.className = "produto-card";
                    card.innerHTML = `
                        <img src="${imgSrc}" class="produto-img" alt="${prod.nome}">
                        <div class="produto-info">
                            <div class="produto-nome">${prod.nome}</div>
                            <div class="produto-categoria">${prod.categoria || 'Geral'}</div>
                            <div class="produto-preco">R$ ${prod.preco.toFixed(2)}</div>
                        </div>
                        <div style="display: flex; flex-direction: column; gap: 8px;">
                            <button class="btn-editar-produto" onclick="editarProduto(${prod.id})">
                                ✏️ Editar
                            </button>
                            <button class="btn-apagar-produto" onclick="apagarProduto(${prod.id}, '${prod.nome}')">
                                🗑️ Apagar
                            </button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                container.innerHTML = "<p style='color: red;'>Erro ao carregar a lista.</p>";
            }
        }

        // --- APAGAR PRODUTO ---
        async function apagarProduto(id, nome) {
            if (!confirm(`Tem a certeza que deseja APAGAR o produto "${nome}"?`)) return;

            try {
                const response = await fetch(`${API_URL}/produtos/${id}`, {
                    method: "DELETE"
                });

                if (response.ok) {
                    if(produtoEditandoId === id) cancelarEdicao(); // Se apagar o que estava a editar, cancela
                    carregarListaProdutos();
                } else {
                    alert("Erro ao apagar o produto.");
                }
            } catch (err) {
                alert("Erro de conexão ao tentar apagar.");
            }
        }

        // Inicia carregando a lista ao abrir a página
        window.onload = carregarListaProdutos;
    </script>
</body>
</html>
