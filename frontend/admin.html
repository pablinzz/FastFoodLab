<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Lab85 - Admin de Produtos</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background: #0d0d0d; color: white; padding: 40px; }
        .form-container { background: #1a1a1a; padding: 30px; border-radius: 20px; max-width: 600px; margin: auto; border: 2px solid #222; }
        h2 { color: #FF5E00; margin-bottom: 20px; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #aaa; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 10px; border: 1px solid #333; background: #222; color: white; font-size: 1rem; }
        
        /* Seção de Ingredientes */
        .ingredientes-section { margin-top: 30px; padding: 20px; background: #111; border-radius: 15px; border: 1px dashed #444; }
        .ingrediente-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .ingrediente-row input { margin-top: 0; }
        .btn-remover { background: #e53935; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; }
        .btn-adicionar { background: #4CAF50; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; margin-top: 10px; font-weight: bold; }
        
        .btn-salvar { width: 100%; background: #FF5E00; color: white; padding: 18px; border: none; border-radius: 12px; font-size: 1.2rem; font-weight: 800; cursor: pointer; margin-top: 30px; }
        .btn-salvar:hover { background: #ff782e; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>🍔 Cadastro de Produto - Lab85</h2>
        <form id="produto-form">
            <label>Nome do Produto:</label>
            <input type="text" id="nome" required placeholder="Ex: Pastel de Carne Especial">

            <label>Preço Base (R$):</label>
            <input type="number" id="preco" step="0.01" required placeholder="Ex: 15.00">

            <label>Categoria:</label>
            <select id="categoria">
                <option value="Lanches">Lanches</option>
                <option value="Pasteis">Pastéis</option>
                <option value="Bebidas">Bebidas</option>
                <option value="Acompanhamentos">Acompanhamentos</option>
            </select>

            <label>URL da Imagem:</label>
            <input type="text" id="imagem_url" placeholder="Link do Supabase Storage">

            <div class="ingredientes-section">
                <h3>Personalização (Extras/Ingredientes)</h3>
                <div id="lista-ingredientes">
                    </div>
                <button type="button" class="btn-adicionar" onclick="adicionarLinhaIngrediente()">+ ADICIONAR ITEM</button>
            </div>

            <button type="submit" class="btn-salvar">SALVAR PRODUTO NO SISTEMA</button>
        </form>
    </div>

    <script>
        const API_URL = "https://fastfoodlab.onrender.com";

        function adicionarLinhaIngrediente() {
            const container = document.getElementById("lista-ingredientes");
            const row = document.createElement("div");
            row.className = "ingrediente-row";
            row.innerHTML = `
                <input type="text" placeholder="Ingrediente (Ex: Bacon)" class="ing-nome" style="flex: 2;">
                <input type="number" step="0.01" placeholder="Preço Extra" class="ing-preco" style="flex: 1;">
                <button type="button" class="btn-remover" onclick="this.parentElement.remove()">X</button>
            `;
            container.appendChild(row);
        }

        document.getElementById("produto-form").onsubmit = async (e) => {
            e.preventDefault();

            // Coleta os ingredientes dinâmicos
            const nomes = document.querySelectorAll(".ing-nome");
            const precos = document.querySelectorAll(".ing-preco");
            const ingredientes = [];

            nomes.forEach((el, i) => {
                if (el.value) {
                    ingredientes.push({
                        nome: el.value,
                        preco: parseFloat(precos[i].value) || 0
                    });
                }
            });

            const dados = {
                nome: document.getElementById("nome").value,
                preco: parseFloat(document.getElementById("preco").value),
                categoria: document.getElementById("categoria").value,
                imagem_url: document.getElementById("imagem_url").value,
                ingredientes_disponiveis: ingredientes // Enviado como lista de objetos
            };

            try {
                const response = await fetch(`${API_URL}/produtos`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(dados)
                });

                if (response.ok) {
                    alert("✅ Produto cadastrado com sucesso!");
                    location.reload();
                } else {
                    alert("❌ Erro ao salvar. Verifique o backend.");
                }
            } catch (err) {
                alert("Erro de conexão com o servidor.");
            }
        };
    </script>
</body>
</html>
