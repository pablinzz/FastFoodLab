<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Boteco do MK - Autoatendimento</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Fonte moderna e amigável -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>

<!-- TOPO FIXO -->
<header class="topbar">
    <div class="brand-area">
        <h1 style="color: var(--yellow); font-weight: 800; font-size: 1.8rem; margin-right: 20px;">🍻 Boteco do MK</h1>
    </div>
    <div class="search-bar">
        <input type="text" placeholder="O que deseja pedir hoje?">
    </div>
</header>

<div class="app-container">
    <!-- MENU ESQUERDO (CATEGORIAS) -->
    <nav class="category-nav">
        <div id="category-list"></div>
    </nav>

    <!-- ÁREA CENTRAL (PRODUTOS) -->
    <main class="product-feed" id="product-feed"></main>

    <!-- ÁREA DIREITA (CARRINHO) -->
    <aside class="cart-sidebar">
        <div class="carrinho-header">
            <h2>🛒 Seu Pedido</h2>
        </div>
        
        <ul id="itens-carrinho" class="lista-itens">
            <div style="color: #666; text-align: center; margin-top: 50px;">Seu carrinho está vazio</div>
        </ul>
        
        <div class="carrinho-footer">
            <div class="total-area">
                <span>Total</span>
                <span class="valor-total">R$ <span id="total">0.00</span></span>
            </div>
            <button class="btn-finalizar" onclick="abrirModalPagamento()">FINALIZAR PEDIDO</button>
            <!-- NOVO BOTÃO DE CANCELAR -->
            <button class="btn-cancelar-pedido" onclick="cancelarPedidoTotem()">Cancelar Pedido</button>
        </div>
    </aside>
</div>

<!-- MODAL DE INGREDIENTES (PERSONALIZAÇÃO) -->
<div id="modal-personalizar" class="modal-overlay" style="display: none;">
    <div class="modal-content" style="max-width: 500px;">
        <button class="btn-fechar-canto" onclick="fecharModalPersonalizar()">X</button>
        <img id="img-produto-modal" src="" style="width: 100%; height: 200px; object-fit: cover; border-radius: 16px 16px 0 0; display: none;">
        
        <div style="padding: 25px;">
            <h2 id="nome-produto-modal" style="color: var(--yellow); font-size: 2rem;">Nome</h2>
            <p id="desc-produto-modal" style="color: #aaa; margin-bottom: 20px;">Delicioso e preparado na hora.</p>
            
            <div id="lista-extras" style="text-align: left; max-height: 250px; overflow-y: auto; margin-bottom: 20px;"></div>

            <div class="total-area-modal" style="background: #111; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333;">
                <span style="font-size: 1.2rem; font-weight: bold;">Total do item:</span>
                <span class="valor-total" id="preco-total-modal" style="color: var(--green); font-size: 1.6rem; font-weight: bold;">R$ 0.00</span>
            </div>

            <button class="btn-adicionar-modal" style="margin-top: 20px; width: 100%;" onclick="confirmarPersonalizacao()">Adicionar ao Carrinho</button>
        </div>

        <!-- 🚀 NOVO: TELA DE SUCESSO (VISTO VERDE GIGANTE) -->
        <div id="modal-sucesso" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(20, 20, 20, 0.95); border-radius: 16px; z-index: 10; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(4px);">
            <div style="font-size: 6rem; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);">✅</div>
            <h2 style="color: var(--green); margin-top: 15px; font-size: 2rem; animation: fadeIn 0.5s ease-in;">Adicionado!</h2>
        </div>

    </div>
</div>

<!-- MODAL DE PAGAMENTO -->
<div id="modal-escolha-pagamento" class="modal-overlay" style="display: none;">
    <div class="modal-content" style="max-width: 800px; width: 90%; padding: 40px; border-color: var(--green);">
        <h2 style="margin-bottom: 30px; font-size: 2.5rem; color: #fff; text-align: center;">Como prefere pagar?</h2>
        <div class="grid-pagamentos">
            <button class="btn-pagamento" onclick="processarPagamento('PIX')">
                <span class="icone">📱</span><strong>PIX</strong><small style="color:var(--green)">QR Code na Tela</small>
            </button>
            <button class="btn-pagamento" onclick="processarPagamento('DEBITO')">
                <span class="icone">💳</span><strong>DÉBITO</strong><small style="color:var(--yellow)">Na maquininha</small>
            </button>
            <button class="btn-pagamento" onclick="processarPagamento('CREDITO')">
                <span class="icone">💳</span><strong>CRÉDITO</strong><small style="color:var(--yellow)">Na maquininha</small>
            </button>
            <button class="btn-pagamento" onclick="processarPagamento('DINHEIRO')">
                <span class="icone">💵</span><strong>DINHEIRO</strong><small style="color:white">Pagar no Caixa</small>
            </button>
        </div>
        <button onclick="document.getElementById('modal-escolha-pagamento').style.display='none'" class="btn-cancelar" style="margin-top: 30px; width: 100%;">Voltar</button>
    </div>
</div>

<!-- MODAL PIX QR CODE -->
<div id="modal-pix" class="modal-overlay" style="display: none;">
    <div class="modal-content" style="padding: 40px; text-align: center; border-color: var(--green);">
        <h2 style="color: var(--green); font-size: 2rem;">Pague com PIX</h2>
        <img id="qr-code-img" src="" style="width: 250px; height: 250px; margin: 20px auto; background: white; padding: 10px; border-radius: 10px;">
        <p class="status-pagamento" style="color: var(--yellow); font-weight: bold; font-size: 1.2rem; animation: piscar 1.5s infinite;">⏳ Aguardando pagamento...</p>
        <button onclick="window.location.reload();" class="btn-cancelar" style="margin-top: 20px;">Cancelar Pedido</button>
    </div>
</div>

<!-- TELA DE BOAS-VINDAS (SPLASH SCREEN) -->
<div id="splash-screen" class="splash-screen" onclick="iniciarAtendimento()">
    <div class="splash-content">
        <h1 style="color: var(--yellow); font-size: 4.5rem; font-weight: 900; margin-bottom: 20px;">🍻 Boteco do MK</h1>
        <p style="font-size: 2.2rem; color: white; animation: piscar 1.5s infinite;">Toque no ecrã para iniciar</p>
    </div>
</div>

<!-- MODAL DE IDENTIFICAÇÃO DO CLIENTE -->
<div id="modal-identificacao" class="modal-overlay" style="display: none; z-index: 2500;">
    <div class="modal-content" style="max-width: 600px; padding: 40px; text-align: center; border-color: var(--yellow);">
        <h2 style="color: var(--yellow); font-size: 2.2rem; margin-bottom: 20px;">Como se chama?</h2>
        <input type="text" id="nome-cliente" placeholder="Digite o seu nome" autocomplete="off" style="width: 100%; padding: 18px; font-size: 1.6rem; border-radius: 12px; border: 2px solid var(--border); background: #111; color: white; margin-bottom: 30px; text-align: center; outline: none;">
        
        <h2 style="color: white; font-size: 1.8rem; margin-bottom: 20px;">Onde vai comer?</h2>
        <div style="display: flex; gap: 20px; justify-content: center;">
            <button class="btn-pagamento" style="flex: 1; padding: 25px;" onclick="confirmarIdentificacao('AQUI')">
                <span style="font-size: 3rem; margin-bottom: 10px; display: block;">🍽️</span>
                <strong>Para Comer Aqui</strong>
            </button>
            <button class="btn-pagamento" style="flex: 1; padding: 25px;" onclick="confirmarIdentificacao('LEVAR')">
                <span style="font-size: 3rem; margin-bottom: 10px; display: block;">🛍️</span>
                <strong>Para Levar</strong>
            </button>
        </div>
    </div>
</div>

<script src="./app.js"></script>
</body>
</html>
