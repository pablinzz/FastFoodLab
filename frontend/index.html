<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Lab85 - Menu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>

<!-- TOPO FIXO -->
<header class="topbar">
    <img src="./Logo Lab85.png" alt="Lab85 Logo" class="logo">
    <div class="search-bar">
        <input type="text" placeholder="O que deseja comer hoje?">
    </div>
</header>

<div class="app-container">
    <!-- MENU ESQUERDO (CATEGORIAS) -->
    <nav class="category-nav" id="category-nav">
        <!-- Injetado via JS -->
    </nav>

    <!-- ÁREA CENTRAL (PRODUTOS) -->
    <main class="product-feed" id="product-feed">
        <!-- Injetado via JS -->
    </main>

    <!-- ÁREA DIREITA (CARRINHO) -->
    <aside class="cart-sidebar">
        <div class="carrinho-header">
            <h2>🛒 Seu Pedido</h2>
        </div>
        <ul id="itens-carrinho" class="lista-itens">
            <!-- Injetado via JS -->
        </ul>
        <div class="carrinho-footer">
            <div class="total-area">
                <span>Total</span>
                <span class="valor-total">R$ <span id="total">0.00</span></span>
            </div>
            <button class="btn-finalizar" onclick="abrirModalPagamento()">FINALIZAR PEDIDO</button>
        </div>
    </aside>
</div>

<!-- MODAL DE INGREDIENTES (PERSONALIZAÇÃO) -->
<div id="modal-personalizar" class="modal-overlay" style="display: none;">
    <div class="modal-content" style="max-width: 500px;">
        <button class="btn-fechar-canto" onclick="fecharModalPersonalizar()">X</button>
        <img id="img-produto-modal" src="" style="width: 100%; height: 200px; object-fit: cover; border-radius: 12px 12px 0 0; display: none;">
        <div style="padding: 20px;">
            <h2 id="nome-produto-modal" style="color: #FF5E00; font-size: 2rem;">Nome</h2>
            <p id="desc-produto-modal" style="color: #aaa; margin-bottom: 20px;">Detalhes do produto...</p>
            
            <div id="lista-extras" style="text-align: left; max-height: 250px; overflow-y: auto; margin-bottom: 20px;">
                <!-- Extras aqui -->
            </div>

            <div class="total-area" style="background: #111; padding: 15px; border-radius: 12px;">
                <span>Total deste Item:</span>
                <span class="valor-total" id="preco-total-modal">R$ 0.00</span>
            </div>

            <button class="btn-finalizar" style="margin-top: 20px;" onclick="confirmarPersonalizacao()">ADICIONAR AO CARRINHO</button>
        </div>
    </div>
</div>

<!-- MODAL DE PAGAMENTO -->
<div id="modal-escolha-pagamento" class="modal-overlay" style="display: none;">
    <div class="modal-content" style="max-width: 800px; width: 90%; padding: 40px;">
        <h2 style="margin-bottom: 30px; font-size: 2.5rem; color: #fff;">Como prefere pagar?</h2>
        <div class="grid-pagamentos">
            <button class="btn-pagamento pix" onclick="processarPagamento('PIX')">
                <span class="icone">📱</span><strong>PIX</strong><small>QR Code na Tela</small>
            </button>
            <button class="btn-pagamento debito" onclick="processarPagamento('DEBITO')">
                <span class="icone">💳</span><strong>DÉBITO</strong><small>Na maquininha</small>
            </button>
            <button class="btn-pagamento credito" onclick="processarPagamento('CREDITO')">
                <span class="icone">💳</span><strong>CRÉDITO</strong><small>Na maquininha</small>
            </button>
            <button class="btn-pagamento dinheiro" onclick="processarPagamento('DINHEIRO')">
                <span class="icone">💵</span><strong>DINHEIRO</strong><small>Pagar no Caixa</small>
            </button>
        </div>
        <button onclick="document.getElementById('modal-escolha-pagamento').style.display='none'" class="btn-cancelar" style="margin-top: 30px; width: 100%;">Voltar</button>
    </div>
</div>

<!-- MODAL PIX QR CODE -->
<div id="modal-pix" class="modal-overlay" style="display: none;">
    <div class="modal-content" style="padding: 40px; text-align: center;">
        <h2 style="color: #4CAF50; font-size: 2rem;">Pague com PIX</h2>
        <img id="qr-code-img" src="" style="width: 250px; height: 250px; margin: 20px auto; background: white; padding: 10px; border-radius: 10px;">
        <p class="status-pagamento" style="color: #FF5E00; font-weight: bold; animation: piscar 1.5s infinite;">⏳ Aguardando pagamento...</p>
        <button onclick="document.getElementById('modal-pix').style.display='none'; clearInterval(intervaloChecagem);" class="btn-cancelar" style="margin-top: 20px;">Cancelar</button>
    </div>
</div>

<script src="./app.js"></script>
</body>
</html>
