<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Lab85 - Autoatendimento</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="container">
    <main class="menu-area">
        <header class="topo">
            <img src="./Logo Lab85.png" alt="Lab85 Logo" class="logo">
            <h1>Faça seu pedido</h1>
        </header>

        <section class="produtos">
            <div id="lista-produtos" class="grid-produtos">
                </div>
        </section>
    </main>

    <aside class="carrinho">
        <div class="carrinho-header">
            <h2>🛒 Seu Pedido</h2>
        </div>

        <ul id="itens-carrinho" class="lista-itens">
            </ul>

        <div class="carrinho-footer">
            <div class="total-area">
                <span>Total</span>
                <span class="valor-total">R$ <span id="total">0.00</span></span>
            </div>
            <button class="btn-finalizar" onclick="abrirModalPagamento()">
                FINALIZAR PEDIDO
            </button>
        </div>
    </aside>
    
</div>

<div id="modal-pix" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <h2>📱 Pague com PIX</h2>
        <p>Escaneie o QR Code abaixo com o aplicativo do seu banco.</p>
        <img id="qr-code-img" src="" alt="QR Code PIX">
        <p class="status-pagamento">⏳ Aguardando confirmação do pagamento...</p>
        <button onclick="cancelarPix()" class="btn-cancelar">Cancelar Pedido</button>
    </div>
</div>

<div id="modal-escolha-pagamento" class="modal-overlay" style="display: none;">
    <div class="modal-content" style="max-width: 800px; width: 90%;">
        <h2 style="margin-bottom: 30px; font-size: 2.8rem; color: #fff;">Como prefere pagar?</h2>
        
        <div class="grid-pagamentos">
            <button class="btn-pagamento pix" onclick="processarPagamento('PIX')">
                <span class="icone">📱</span>
                <strong>PIX</strong>
                <small>QR Code na Tela</small>
            </button>

            <button class="btn-pagamento debito" onclick="processarPagamento('DEBITO')">
                <span class="icone">💳</span>
                <strong>DÉBITO</strong>
                <small>Na maquininha ao lado</small>
            </button>

            <button class="btn-pagamento credito" onclick="processarPagamento('CREDITO')">
                <span class="icone">💳</span>
                <strong>CRÉDITO</strong>
                <small>Na maquininha ao lado</small>
            </button>

            <button class="btn-pagamento dinheiro" onclick="processarPagamento('DINHEIRO')">
                <span class="icone">💵</span>
                <strong>DINHEIRO</strong>
                <small>Pagar no Caixa</small>
            </button>
        </div>
        
        <button onclick="fecharModalPagamento()" class="btn-cancelar" style="margin-top: 40px; width: 100%;">Voltar</button>
    </div>
</div>

<div id="modal-status-generico" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <h2 id="status-titulo">Aguardando...</h2>
        <p id="status-mensagem" style="font-size: 1.5rem; margin: 20px 0; color: #ccc;"></p>
        <p class="status-pagamento" id="status-animacao">⏳ Processando...</p>
        <button onclick="cancelarPedidoAtual()" class="btn-cancelar">Cancelar Pedido</button>
    </div>
</div>

<script src="./app.js"></script>
</body>
</html>
