<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Admin - Produtos</title>

    <style>
        body {
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
            padding: 40px;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 30px;
        }

        .form {
            max-width: 500px;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 16px;
        }

        label {
            font-size: 18px;
            display: block;
            margin-top: 20px;
        }

        input {
            width: 100%;
            padding: 14px;
            font-size: 18px;
            border-radius: 10px;
            border: none;
            margin-top: 8px;
        }

        button {
            margin-top: 30px;
            width: 100%;
            padding: 16px;
            font-size: 22px;
            background: #00c853;
            border: none;
            border-radius: 14px;
            cursor: pointer;
        }

        button:hover {
            background: #00e676;
        }

        .msg {
            margin-top: 20px;
            font-size: 18px;
            color: #00ff99;
        }
    </style>
</head>
<body>

<h1>➕ Cadastrar Produto</h1>

<div class="form">
    <label>Nome do produto</label>
    <input type="text" id="nome">

    <label>Preço (R$)</label>
    <input type="number" id="preco" step="0.01">

    <label>Categoria</label>
    <input type="text" id="categoria">

    <label>URL da Imagem:</label>
    <input type="text" id="imagem_url" placeholder="https://...supabase.co/storage/.../foto.jpg">

    <button onclick="salvarProduto()">Salvar Produto</button>

    <div class="msg" id="msg"></div>
</div>

<script>
async function salvarProduto() {
    const nome = document.getElementById("nome").value;
    const preco = document.getElementById("preco").value;
    const categoria = document.getElementById("categoria").value;
    const imagem_url = document.getElementById("imagem_url").value;

    const response = await fetch("https://fastfoodlab.onrender.com/produtos", {
        method: "POST",
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            nome,
            preco: parseFloat(preco),
            categoria,
            imagem_url
        })
    });

    if (response.ok) {
        document.getElementById("msg").innerText = "✅ Produto cadastrado com sucesso!";
        document.getElementById("nome").value = "";
        document.getElementById("preco").value = "";
        document.getElementById("categoria").value = "";
    } else {
        document.getElementById("msg").innerText = "❌ Erro ao cadastrar produto";
    }
}
</script>

</body>
</html>
